site_name: generate_ledger
site_description: Generate custom XRPL genesis ledgers and test network environments
repo_url: https://github.com/legleux/generate_ledger
repo_name: legleux/generate_ledger

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  # palette:
  #   - media: "(prefers-color-scheme: light)"
  #     scheme: default
  #     toggle:
  #       icon: material/weather-night
  #       name: Switch to dark mode

  #   - media: "(prefers-color-scheme: dark)"
  #     scheme: dark
  #     toggle:
  #       icon: material/weather-sunny
  #       name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - How It Works: how-it-works.md
  - CLI Reference: cli.md
  - Library API: library.md
  - Amendments: amendments.md
  - Release Process: release.md
  - Development: development.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
