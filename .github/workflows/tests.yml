---
name: Tests

on:
  push:
    branches: [main, develop, "ci/*"]
  pull_request:
    branches: [main, develop]

jobs:
  # TODO: webiny/action-conventional-commits uses Node.js 20 (deprecated June 2026).
  # Replace with a Node 24-compatible alternative or drop in favor of local pre-commit hook.
  commit-message:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: webiny/action-conventional-commits@4ae80bc67b0b2e72a4d091a7b18eb4ecc7db68c8 # v1.3.0

  lint:
    runs-on: ubuntu-latest
    container: ghcr.io/astral-sh/uv:python3.13-bookworm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: uv sync --group lint
      - run: uv run ruff check .

  complexity:
    runs-on: ubuntu-latest
    container: ghcr.io/astral-sh/uv:python3.13-bookworm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: uv sync
      - name: Cognitive complexity (complexipy)
        run: |
          uv run complexipy src/generate_ledger/ --max-complexity-allowed 15 --output-csv || true

          echo "## Complexity Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Summary counts
          total=$(uv run complexipy src/generate_ledger/ --max-complexity-allowed 15 2>&1 | \
            grep -c "PASSED\|FAILED" || true)
          passed=$(uv run complexipy src/generate_ledger/ --max-complexity-allowed 15 2>&1 | grep -c "PASSED" || true)
          failed=$(uv run complexipy src/generate_ledger/ --max-complexity-allowed 15 2>&1 | grep -c "FAILED" || true)

          echo "### Cognitive Complexity (complexipy)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total functions | $total |" >> $GITHUB_STEP_SUMMARY
          echo "| Within threshold (<=15) | $passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Over threshold (>15) | $failed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$failed" -gt 0 ]; then
            echo "<details><summary>Functions over threshold ($failed)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| File | Function | Score |" >> $GITHUB_STEP_SUMMARY
            echo "|------|----------|-------|" >> $GITHUB_STEP_SUMMARY
            uv run complexipy src/generate_ledger/ --max-complexity-allowed 15 2>&1 \
              | grep "FAILED" \
              | sed -E 's/^([^ ]+)/\1/' \
              | awk '{print "| " $1 " | " $2 " | " $3 " |"}' \
              >> $GITHUB_STEP_SUMMARY || true
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cyclomatic complexity (radon)
        run: |
          echo "### Cyclomatic Complexity (radon)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Extract average line
          avg=$(uv run radon cc src/generate_ledger/ -a -nc 2>&1 | tail -1)
          echo "**$avg**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count by grade
          output=$(uv run radon cc src/generate_ledger/ -a -nc 2>&1)
          count_c=$(echo "$output" | grep -c " - C$" || true)
          count_d=$(echo "$output" | grep -c " - D$" || true)
          count_e=$(echo "$output" | grep -c " - E$" || true)
          count_f=$(echo "$output" | grep -c " - F$" || true)
          flagged=$((count_c + count_d + count_e + count_f))

          echo "| Grade | Count | Severity |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|----------|" >> $GITHUB_STEP_SUMMARY
          [ "$count_c" -gt 0 ] && echo "| C (11-20) | $count_c | Moderate |" >> $GITHUB_STEP_SUMMARY
          [ "$count_d" -gt 0 ] && echo "| D (21-30) | $count_d | High |" >> $GITHUB_STEP_SUMMARY
          [ "$count_e" -gt 0 ] && echo "| E (31-40) | $count_e | Very High |" >> $GITHUB_STEP_SUMMARY
          [ "$count_f" -gt 0 ] && echo "| F (41+) | $count_f | Critical |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$flagged" -gt 0 ]; then
            echo "<details><summary>All flagged functions ($flagged)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$output" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Maintainability index (radon)
        run: |
          echo "### Maintainability Index (radon)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          uv run radon mi src/generate_ledger/ -s >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload complexity report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: complexity-report
          path: complexipy_results_*.csv

  test:
    needs: [lint]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [13, 14]
        os: [bookworm, trixie]
    container: ghcr.io/astral-sh/uv:python3.${{ matrix.version }}-${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        run: uv sync --group dev --group fast
      - run: uv run pytest

  test-macos:
    needs: [lint]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Install dependencies
        run: uv sync --group dev --group fast
      - run: uv run pytest

  docs-build:
    needs: [test, test-macos]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - run: uv python install 3.13
      - run: uv sync
      - name: Build docs
        run: uv run mkdocs build --strict
      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: site

  docs-deploy:
    needs: [docs-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
