name: Tests

on:
  push:
    branches: [main, develop, "ci/*"]
  pull_request:
    branches: [main, develop]

jobs:
  commit-message:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: webiny/action-conventional-commits@4ae80bc67b0b2e72a4d091a7b18eb4ecc7db68c8 # v1.3.0

  lint:
    needs: [commit-message]
    if: ${{ !cancelled() && (needs.commit-message.result == 'success' || needs.commit-message.result == 'skipped') }}
    runs-on: ubuntu-latest
    container: ghcr.io/astral-sh/uv:python3.13-bookworm
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - run: uv sync --group lint
      - run: uv run ruff check .

  complexity:
    needs: [commit-message]
    if: ${{ !cancelled() && (needs.commit-message.result == 'success' || needs.commit-message.result == 'skipped') }}
    runs-on: ubuntu-latest
    container: ghcr.io/astral-sh/uv:python3.13-bookworm
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - run: uv sync
      - name: Run complexipy
        run: |
          uv run complexipy src/generate_ledger/ --output-file complexipy-report.txt || true
          uv run complexipy src/generate_ledger/ 2>&1 | tee complexipy-report.txt || true
      - name: Run radon cyclomatic complexity
        run: |
          uv run radon cc src/generate_ledger/ -s -a 2>&1 | tee radon-cc-report.txt
      - name: Run radon maintainability index
        run: |
          uv run radon mi src/generate_ledger/ -s 2>&1 | tee radon-mi-report.txt
      - name: Write job summary
        run: |
          echo "## Complexity Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Complexipy (cognitive complexity, threshold 15)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "FAILED|^Failed" complexipy-report.txt >> $GITHUB_STEP_SUMMARY || echo "All functions passed" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Radon Cyclomatic Complexity (grade C and worse)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          uv run radon cc src/generate_ledger/ -s -a --min C 2>&1 >> $GITHUB_STEP_SUMMARY || echo "All functions grade A/B" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Radon Maintainability Index" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat radon-mi-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Upload complexity reports
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: complexity-reports
          path: |
            complexipy-report.txt
            radon-cc-report.txt
            radon-mi-report.txt

  test:
    needs: [lint, complexity]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [12, 13, 14]
        os: [bookworm, trixie]
    container: ghcr.io/astral-sh/uv:python3.${{ matrix.version }}-${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install dependencies
        run: |
          uv sync --group dev --group fast ||
          (rm -rf .venv && uv sync --group dev && echo "::warning::fast backends unavailable on this platform")
      - run: uv run pytest

  test-macos:
    needs: [lint, complexity]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: |
          uv sync --group dev --group fast ||
          (rm -rf .venv && uv sync --group dev && echo "::warning::fast backends unavailable on this platform")
      - run: uv run pytest

  docs-build:
    needs: [test, test-macos]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: astral-sh/setup-uv@v6
      - run: uv python install 3.13
      - run: uv sync
      - name: Build docs
        run: uv run mkdocs build --strict
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  docs-deploy:
    needs: [docs-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
