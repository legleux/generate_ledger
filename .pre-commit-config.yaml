repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # v6.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: e05c5c0818279e5ac248ac9e954431ba58865e61 # v0.15.7
    hooks:
      - id: ruff-check
        stages: [pre-commit]
      - id: ruff-format
        stages: [pre-commit]

  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: a42085ade523f591dca134379a595e7859986445 # v9.7.0
    hooks:
      - id: cspell
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: conventional-pre-commit
        name: Conventional Commit
        language: system
        entry: sh -c 'case "$(git branch --show-current)" in main|develop) uvx conventional-pre-commit "$@";; *) exit 0;; esac' --
        stages: [commit-msg]
        always_run: true

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: c2bc67fe8f8f549cc489e00ba8b45aa18ee713b1 # v3.8.1
    hooks:
      - id: prettier
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest tests/ -x -q --no-header
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
