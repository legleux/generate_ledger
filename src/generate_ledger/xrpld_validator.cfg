[server]
port_rpc_admin_local
port_peer
port_ws_admin_local

[port_rpc_admin_local]
port = 5005
ip = 0.0.0.0
admin = [0.0.0.0]
protocol = http

[port_peer]
port = 2459
ip = 0.0.0.0
protocol = peer

[port_ws_admin_local]
port = 6006
ip = 0.0.0.0
admin = [0.0.0.0]
protocol = ws
send_queue_limit = 500

[node_db]
type = NuDB
path = /var/lib/xrpld/db/nudb

[ledger_history]
full

[database_path]
/var/lib/xrpld/db

[debug_logfile]
/var/log/xrpld/debug.log

[node_size]
huge

[beta_rpc_api]
1

[rpc_startup]
{ "command": "log_level", "severity": "$log_level" }

[ssl_verify]
0

[compression]
0

[peer_private]
0

[signing_support]
false

[ips_fixed]
$ips_fixed

[validators]
$validator_pubkeys

[voting]
reference_fee = $reference_fee
account_reserve = $account_reserve
owner_reserve = $owner_reserve
$features_block$amendment_majority_time_block$validation_seed_block
