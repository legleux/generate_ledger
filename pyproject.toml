[project]
name = "legleux-generate-ledger"
dynamic = ["version"]
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Michael Legleux", email = "legleux@gmail.com" }
]
requires-python = ">=3.11"
dependencies = [
    "base58>=2.1.1",
    "click>=8.2.1",
    "httpx>=0.28.1",
    "mako>=1.3.10",
    "pytest-asyncio>=1.1.0",
    "ruamel-yaml>=0.18.14",
    "xrpl-py>=4.2.0",
]

[project.scripts]
gen = "generate_ledger:main"
generate = "generate_ledger:main"
compose = "generate_ledger:compose"
ledger = "generate_ledger:ledger"
config = "generate_ledger:config"
testnet = "generate_ledger:testnet"

# [tool.taskipy.tasks]
# test = "pytest -vv -s"
# lint = "ruff check --fix src"
# test = "pytest -q"
# lint = "ruff check src tests"
# fmt  = "black src tests"
[tool.poe.tasks]
test = "pytest -vv -s"
# cov = { cmd = "pytest --cov=${pkg} --cov-report=term-missing", args = [{ name = "pkg", default = "generate_ledger" }] }
[tool.poe.tasks.cov]
cmd = "pytest --cov=${pkg} --cov-report=${report}"
[[tool.poe.tasks.cov.args]]
name = "pkg"
default = "generate_ledger"
[[tool.poe.tasks.cov.args]]
name = "report"
default = "term-missing"

[build-system]
requires = ["hatchling",  "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "uv-dynamic-versioning"
[tool.hatch.build.hooks.version]
path = "src/generate_ledger/_version.py"
template = '''
version = "{version}"
'''
# [tool.hatch.version.vcs]
# tag_regex = "^(?P<version>[0-9]+(?:\\.[0-9]+)*)$"

[tool.hatch.build.targets.wheel]
packages = ["src/generate_ledger"]

[dependency-groups]
dev = [
    "poethepoet>=0.37.0",
    "pytest>=8.4.1",
    "pytest-cov>=6.2.1",
    "taskipy>=1.14.1",
]

[tool.pytest.ini_options]
addopts = "-ra -q"
testpaths = ["tests"]
log_cli = true
log_cli_level = "DEBUG"
# log_level = "WARNING" # Ignore libraries logging
default_algo = "ed25519"


[tool.uv-dynamic-versioning]
vcs = "git"
style = "pep440"
pattern = "default-unprefixed"
format-jinja = """
    {%- if distance == 0 -%}
        {{ serialize_pep440(base, stage, revision) }}
    {%- elif revision is not none -%}
        {{ serialize_pep440(base, stage, revision + 1, dev=distance, metadata=[commit]) }}
    {%- else -%}
        {{ serialize_pep440(bump_version(base), stage, revision, dev=distance, metadata=[commit]) }}
    {%- endif -%}
"""
fallback-version = "6.6.6"

[tool.uv]
cache-keys = [{ file = "pyproject.toml" }, { git = { commit = true, tags = true }}]
# optional markers; uncomment if you use them
# markers = [
#   "unit: fast, isolated tests",
#   "integration: slower, external deps"
# ]

[tool.coverage.run]
branch = true
source = ["src/generate_ledger"]
omit = [
  "*/__init__.py",
  "_version.py"
]

[tool.coverage.report]
show_missing = true
fail_under = 80

[tool.ruff]
line-length = 120
